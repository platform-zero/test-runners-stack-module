---
schemaVersion: 1
module: "test-runners"
target: "apps"
services:
  test-runner:
    image: "stack/test-runner:local-build"
    build:
      context: "./build"
      containerfile: "./stack.containers/test-runner/Containerfile"
    containerName: "test-runner"
    lifecycle: "on-demand"
    updatePolicy: "pinned"
    placement: "rootful"
    dependencies:
      postgres-ssd-bootstrap: "completed"
    environment:
      TEST_SUITE_NAME: "stack-contract"
      TEST_RUNNER_RUNTIME_ROOT: "/runtime"
      TEST_RUNNER_COMPONENTS_LOCK_FILE: "/component-lock/components.lock.json"
      TEST_RUNNER_COMPOSE_PROJECT_NAME: "${COMPOSE_PROJECT_NAME:-webservices}"
      TEST_RUNNER_CONTAINER_CLI: "podman"
      CONTAINER_HOST: "unix:///run/podman/podman.sock"
      PLAYWRIGHT_ORIGIN_BYPASS_HOST: "169.254.1.2"
      TESTDEV_SKIP_GPU_INGESTION: "${TESTDEV_SKIP_GPU_INGESTION:-0}"
      CADDY_CONTAINER: "${CADDY_CONTAINER:-caddy}"
      DOMAIN: "${DOMAIN}"
      BASE_URL: "https://${DOMAIN}"
      CADDY_URL: "http://host.containers.internal:80"
      IDENTITY_PROVIDER: "${IDENTITY_PROVIDER:-keycloak}"
      KEYCLOAK_EXPERIMENTAL: "${KEYCLOAK_EXPERIMENTAL:-0}"
      KEYCLOAK_URL: "${KEYCLOAK_URL:-https://keycloak.${DOMAIN}}"
      KEYCLOAK_INTERNAL_URL: "${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM:-webservices}"
      KEYCLOAK_ADMIN_USER: "${KEYCLOAK_ADMIN_USER:-admin}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      PW_SKIP_GLOBAL_SETUP: "${PW_SKIP_GLOBAL_SETUP:-0}"
      STACK_STANDARD_SERVICE_FILTER: "${STACK_STANDARD_SERVICE_FILTER:-}"
      STACK_STANDARD_FEATURE_FILTER: "${STACK_STANDARD_FEATURE_FILTER:-}"
      TEST_RUNNER_OAUTH_SECRET: "${TEST_RUNNER_OAUTH_SECRET}"
      PLAYWRIGHT_IGNORE_HTTPS_ERRORS: "true"
      MODEL_CONTEXT_OIDC_CLIENT_ID: "${MODEL_CONTEXT_OIDC_CLIENT_ID:-test-runner}"
      MODEL_CONTEXT_OIDC_REDIRECT_URI: "${MODEL_CONTEXT_OIDC_REDIRECT_URI:-http://test-runner-managed/callback}"
      MODEL_CONTEXT_OIDC_SCOPE: "${MODEL_CONTEXT_OIDC_SCOPE:-openid profile email\
        \ groups}"
      MODEL_CONTEXT_PROXY_AUTH_SECRET: "${MODEL_CONTEXT_PROXY_AUTH_SECRET}"
      OPENSEARCH_URL: "${OPENSEARCH_URL:-http://opensearch:9200}"
      OPENSEARCH_USERNAME: "${OPENSEARCH_USERNAME:-admin}"
      OPENSEARCH_ADMIN_PASSWORD: "${OPENSEARCH_ADMIN_PASSWORD}"
      OPENSEARCH_PASSWORD: "${OPENSEARCH_ADMIN_PASSWORD}"
      INFERENCE_CONTROLLER_API_TOKEN: "${INFERENCE_CONTROLLER_API_TOKEN}"
      GPU_ARBITER_API_TOKEN: "${GPU_ARBITER_API_TOKEN}"
      DISABLE_TLS_VALIDATION: "true"
      STACK_ADMIN_USER: "${STACK_ADMIN_USER}"
      STACK_ADMIN_PASSWORD: "${STACK_ADMIN_PASSWORD}"
      STACK_ADMIN_EMAIL: "${STACK_ADMIN_EMAIL}"
      POSTGRES_HOST: "postgres-ssd"
      POSTGRES_PORT: 5432
      POSTGRES_DB: "webservices"
      POSTGRES_USER: "test_runner_user"
      POSTGRES_PASSWORD: "${POSTGRES_TEST_RUNNER_PASSWORD}"
      MATRIX_POSTGRES_HOST: "postgres"
      MATRIX_POSTGRES_PORT: 5432
      MATRIX_POSTGRES_DB: "synapse"
      MATRIX_POSTGRES_USER: "synapse"
      MATRIX_POSTGRES_PASSWORD: "${POSTGRES_SYNAPSE_PASSWORD}"
      SYNAPSE_REGISTRATION_SECRET: "${SYNAPSE_REGISTRATION_SECRET}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      SEAFILE_USERNAME: "${STACK_ADMIN_EMAIL}"
      SEAFILE_PASSWORD: "${STACK_ADMIN_PASSWORD}"
      FORGEJO_USERNAME: "${STACK_ADMIN_USER}"
      PLANKA_EMAIL: "${STACK_ADMIN_EMAIL}"
      PLANKA_PASSWORD: "${STACK_ADMIN_PASSWORD}"
      MASTODON_EMAIL: "${STACK_ADMIN_EMAIL}"
      MASTODON_PASSWORD: "${STACK_ADMIN_PASSWORD}"
      MASTODON_API_TOKEN: "${MASTODON_API_TOKEN}"
      MASTODON_HOST_HEADER: "mastodon.${DOMAIN}"
      MARIADB_HOST: "mariadb"
      MARIADB_PORT: 3306
      MARIADB_USER: "bookstack"
      MARIADB_PASSWORD: "${MARIADB_BOOKSTACK_PASSWORD}"
      VALKEY_ADMIN_PASSWORD: "${VALKEY_ADMIN_PASSWORD}"
      VALKEY_PASSWORD: "${VALKEY_ADMIN_PASSWORD}"
      QDRANT_API_KEY: "${QDRANT_ADMIN_API_KEY}"
      NTFY_USERNAME: "${NTFY_USERNAME}"
      NTFY_PASSWORD: "${NTFY_PASSWORD}"
      BOOKSTACK_API_TOKEN_ID: "${BOOKSTACK_API_TOKEN_ID}"
      BOOKSTACK_API_TOKEN_SECRET: "${BOOKSTACK_API_TOKEN_SECRET}"
      VAULTWARDEN_ORG_ID: "${VAULTWARDEN_ORG_ID}"
      VAULTWARDEN_ORG_IDENTIFIER: "${VAULTWARDEN_ORG_IDENTIFIER}"
      AIDER_OLLAMA_API_BASE: "${AIDER_OLLAMA_API_BASE:-https://api.openai.com/v1}"
      AIDER_MODEL: "${AIDER_MODEL:-gpt-4o-mini}"
      JUPYTER_NOTEBOOK_IMAGE: "${JUPYTER_NOTEBOOK_IMAGE:-platform-jupyter-notebook:5.4.3}"
    extraHosts:
    - "${DOMAIN}:host-gateway"
    - "keycloak.${DOMAIN}:host-gateway"
    - "keycloak-auth.${DOMAIN}:host-gateway"
    - "keycloak-whoami.${DOMAIN}:host-gateway"
    - "onboarding.${DOMAIN}:host-gateway"
    - "kopia.${DOMAIN}:host-gateway"
    - "prometheus.${DOMAIN}:host-gateway"
    - "alerts.${DOMAIN}:host-gateway"
    - "grafana.${DOMAIN}:host-gateway"
    - "vaultwarden.${DOMAIN}:host-gateway"
    - "api.vaultwarden.${DOMAIN}:host-gateway"
    - "planka.${DOMAIN}:host-gateway"
    - "huly.${DOMAIN}:host-gateway"
    - "bookstack.${DOMAIN}:host-gateway"
    - "api.bookstack.${DOMAIN}:host-gateway"
    - "sogo.${DOMAIN}:host-gateway"
    - "jellyfin.${DOMAIN}:host-gateway"
    - "donetick.${DOMAIN}:host-gateway"
    - "erpnext.${DOMAIN}:host-gateway"
    - "seafile.${DOMAIN}:host-gateway"
    - "api.seafile.${DOMAIN}:host-gateway"
    - "onlyoffice.${DOMAIN}:host-gateway"
    - "matrix.${DOMAIN}:host-gateway"
    - "api.matrix.${DOMAIN}:host-gateway"
    - "matrix-rtc.${DOMAIN}:host-gateway"
    - "element.${DOMAIN}:host-gateway"
    - "api.element.${DOMAIN}:host-gateway"
    - "mastodon.${DOMAIN}:host-gateway"
    - "api.mastodon.${DOMAIN}:host-gateway"
    - "portal.${DOMAIN}:host-gateway"
    - "homepage.${DOMAIN}:host-gateway"
    - "www.${DOMAIN}:host-gateway"
    - "mail.${DOMAIN}:host-gateway"
    - "jupyterhub.${DOMAIN}:host-gateway"
    - "homeassistant.${DOMAIN}:host-gateway"
    - "direct.homeassistant.${DOMAIN}:host-gateway"
    - "api.homeassistant.${DOMAIN}:host-gateway"
    - "ntfy.${DOMAIN}:host-gateway"
    - "clickhouse.${DOMAIN}:host-gateway"
    - "models.${DOMAIN}:host-gateway"
    - "forgejo.${DOMAIN}:host-gateway"
    - "search.${DOMAIN}:host-gateway"
    - "pipeline.${DOMAIN}:host-gateway"
    - "qbittorrent.${DOMAIN}:host-gateway"
    networks:
    - "ai"
    - "caddy"
    - "default"
    - "internet"
    - "mailserver"
    - "mariadb"
    - "mastodon-internal"
    - "matrix-internal"
    - "memcached"
    - "monitoring"
    - "pipeline"
    - "postgres"
    - "qdrant"
    - "opensearch"
    - "valkey"
    volumes:
    - type: "bind"
      source: "/var/lib/webservices/test-results"
      target: "/app/test-results"
    - type: "bind"
      source: "/var/lib/webservices/current/build"
      target: "/runtime"
      read_only: true
    - type: "bind"
      source: "/var/lib/webservices/current/site/components.lock.json"
      target: "/component-lock/components.lock.json"
      read_only: true
    - type: "volume"
      source: "caddy_ca"
      target: "/ca"
      read_only: true
    - type: "bind"
      source: "/run/user/999/podman/podman.sock"
      target: "/run/podman/podman.sock"
    restart: "no"
    tmpfs:
    - "/tmp"
    init: true
    resources:
      limits:
        memory: "${TEST_RUNNER_MEMORY_LIMIT:-4G}"
        cpus: "${TEST_RUNNER_CPU_LIMIT:-3.0}"
  test-runner-managed:
